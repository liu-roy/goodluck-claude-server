<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClaudeCode 工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <link rel="stylesheet" href="/css/workspace.css">
</head>
<body>

<!-- 工具栏 -->
<div class="toolbar">
  <div class="group">
    <label>项目</label>
    <select id="selProject"><option value="">-- 选择项目 --</option></select>
    <button class="btn btn-primary" id="btnCloneProject">克隆项目</button>
  </div>
  <div class="group">
    <label>会话</label>
    <select id="selSession"><option value="">-- 选择会话 --</option></select>
    <button class="btn btn-secondary" id="btnNewSession">新建会话</button>
  </div>
  <div class="group" id="branchGroup" style="display:none;">
    <label>分支</label>
    <select id="selBranch"><option value="">-- 加载远程分支 --</option></select>
    <button class="btn btn-secondary" id="btnRefreshBranches" type="button" title="fetch 并刷新远程分支列表">刷新</button>
  </div>
  <div style="margin-left:auto; display:flex; align-items:center; gap:8px;">
    <span style="font-size:12px; color:#888;" id="userLabel"></span>
    <button class="btn btn-secondary" id="btnLogout" style="font-size:12px;">退出</button>
  </div>
</div>

<!-- 克隆弹窗 -->
<div class="modal-overlay" id="cloneOverlay">
  <div class="modal">
    <div class="modal-head"><h3>克隆 Git 项目</h3><button class="close" id="btnCloneClose">关闭</button></div>
    <div class="modal-body">
      <div class="field"><label>Git 仓库地址 *</label><input type="text" id="cloneGitUrl" placeholder="https://github.com/user/repo.git"></div>
      <div class="field"><label>分支</label><input type="text" id="cloneBranch" placeholder="留空默认主分支"></div>
      <div class="field"><label>项目目录名</label><input type="text" id="cloneProjectName" placeholder="留空则从 URL 自动解析"><div class="hint">克隆后在项目列表中显示的名称</div></div>
      <div class="field"><label>Git 用户名</label><input type="text" id="cloneUsername" placeholder="私有仓库填写"></div>
      <div class="field"><label>Git 密码 / Token</label><input type="password" id="clonePassword" placeholder="私有仓库填写"></div>
    </div>
    <div class="clone-status" id="cloneStatus"></div>
    <div class="modal-foot"><button class="btn-cancel" id="btnCloneCancel">取消</button><button class="btn-ok" id="btnCloneOk">克隆</button></div>
  </div>
</div>

<!-- 主区域 -->
<div class="main">
  <div class="tree-panel" id="treePanel">
    <div class="panel-head">资源管理器</div>
    <div class="tree-search" id="treeSearchWrap" style="display:none;">
      <span class="search-icon" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.2-4.2"/></svg></span>
      <input type="text" id="treeSearchInput" placeholder="搜索文件名…" autocomplete="off">
    </div>
    <div class="tree-body" id="treeBody">
      <div class="placeholder" id="treePlaceholder">请先选择项目</div>
      <div id="treeRoot" style="display:none;"></div>
      <div class="search-result" id="searchResult" style="display:none;"></div>
    </div>
  </div>

  <div class="resize-handle" id="treeResizer" title="拖拽调整左侧栏宽度"></div>

  <div class="content-panel">
    <div class="content-toolbar">
      <span class="path" id="filePath">未选择文件</span>
      <div class="ct-actions" id="ctActions"></div>
    </div>
    <div class="content-body" id="contentBody"><span class="hint">点击左侧文件查看内容</span></div>
  </div>

  <div class="resize-handle" id="chatResizer"></div>

  <div class="chat-panel" id="chatPanel">
    <div class="chat-tabs">
      <div class="chat-tab active" id="tabChat">对话</div>
      <div class="chat-tab" id="tabHistory">会话记录</div>
    </div>
    <div class="chat-view" id="viewChat">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty" id="chatEmpty">
          <div class="icon">💬</div>
          <div class="text">选择项目和会话后<br>在这里与 Claude 对话</div>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-wrap" id="inputWrap">
          <textarea id="txtPrompt" rows="1" placeholder="输入需求，按 Enter 发送（Shift+Enter 换行）…"></textarea>
          <button class="send-btn" id="btnSend" title="发送">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="chat-status" id="sendStatus"></div>
      </div>
    </div>
    <div class="history-view hidden" id="viewHistory">
      <div class="history-toolbar">
        <span class="tip">点击「继续」回到对话并加载历史</span>
        <button id="btnRefreshHistory">刷新</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty" id="historyEmpty">暂无会话记录</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/properties/properties.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/go/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/groovy/groovy.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/rust/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/ruby/ruby.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/php/php.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/dockerfile/dockerfile.min.js"></script>
<script src="/js/workspace.js"></script>
</body>
</html>
