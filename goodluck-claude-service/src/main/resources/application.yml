spring:
  application:
    name: claude-server
  profiles:
    active: docker

  # H2 数据源
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/claude-session
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

  # H2 控制台（调试用，生产可关）
  h2:
    console:
      enabled: true
      path: /h2-console

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl



# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 200
      minSpare: 10
    connection-timeout: 20000


# 日志配置
logging:
  level:
    root: INFO
    com.example: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'



management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: info,health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}



knife4j:
  enable: true
  basic:
    enable: true
    username: xxx
    password: xxxxxxxx
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.goodluck



# 登录配置
goodluck:
  login:
    enabled: true
    path: /login
    token-expire-seconds: 86400
    jwt-secret: goodluck-claude-server-jwt-secret-2026
    whitelist: /actuator/**,/error,/swagger-ui/**,/swagger-ui.html,/swagger-resources/**,/v3/api-docs/**,/doc.html,/webjars/**,/login,/login.html,/workspace.html,/favicon.ico,/h2-console/**
    users:
      - username: admin
        password: admin123

# Claude配置
