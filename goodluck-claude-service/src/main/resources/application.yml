# GitLab配置
gitlab:
  # GitLab服务器地址
  host: https://hgit.goodluck.net/
  # GitLab访问令牌（请通过环境变量 GITLAB_ACCESS_TOKEN 配置）
  access-token: ${GITLAB_ACCESS_TOKEN:}
  # 默认组ID
  default-group-id: 14152
  # Webhook是否启用SSL
  webhook-enable-ssl: true
  # 推送事件处理配置
  push-event-handle-enabled: false
  # 分支保护配置
  protect-branch-enabled: false

# Git自动提交配置
git:
  auto-commit:
    # 是否启用自动提交
    enabled: true
    # 默认提交作者
    author: xxxx
    # 默认提交邮箱
    email: 1111@11.com
