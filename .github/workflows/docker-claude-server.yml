name: claude-server ci

on:
  workflow_dispatch:
    inputs:
      action_name:
        description: 'Choose the action to perform'
        required: true
        default: 'build'
        type: string
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制 Node.js 24

    steps:
      - name: Checkout code
        uses: actions/checkout@v3   # 升级到 v3

      - name: Cache Maven repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: maven-cache-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-cache-${{ runner.os }}-

      - name: Setup Java JDK
        uses: actions/setup-java@v4.6.0  # 如果有 v4.6+ 就用，兼容 Node.js 24
        with:
          java-version: 8
          distribution: zulu

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          echo "${{ secrets.MAVEN_SETTINGS }}" > ~/.m2/settings.xml 

      - name: Build with Maven
        run: mvn clean package -DskipTests -s ~/.m2/settings.xml

      - name: Build the Docker image
        run: docker build --tag liuroy/goodluck-claude-server --file ./DockerFile .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push liuroy/goodluck-claude-server